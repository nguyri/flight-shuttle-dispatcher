services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: flight-checker-app
    restart: always
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - VERBOSE_LOGGING=True
      - PYTHONUNBUFFERED=1
    networks:
      - backend   # 🔥 ADD THIS

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./auth:/etc/nginx/auth:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/zenzic-site:/var/www/zenzic-site:ro
    depends_on:
      - twilio-forwarder
    networks:
      - backend

  twilio-forwarder:
    build: ../twilio-forwarder
    container_name: twilio_forwarder
    expose:
      - "5001"
    env_file:
      - ../twilio-forwarder/.env
    networks:
      - backend

networks:
  backend:
    driver: bridge