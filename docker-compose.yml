services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: flight-checker-app
    restart: always
    # Map the current root so that flight_cache.json and passenger_cache.json persist 
    # directly on the host file system instead of disappearing when the container stops
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - VERBOSE_LOGGING=True
      # Streamlit forces lookups on standard web sockets
      - PYTHONUNBUFFERED=1

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"  # <-- HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./auth:/etc/nginx/auth:ro
      # Mount the host certificates directory directly into Nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app