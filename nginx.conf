# 1. Automatically redirect HTTP (80) to HTTPS (443)
server {
    listen 80;
    server_name flights.zenzic.xyz;
    return 301 https://$host$request_uri;
}

# 2. Secure HTTPS Server Setup
server {
    listen 443 ssl;
    server_name flights.zenzic.xyz;

    # SSL Certificates (Change paths to match your exact domain name)
    ssl_certificate /etc/letsencrypt/live/flights.zenzic.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flights.zenzic.xyz/privkey.pem;

    # Optimized security parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        # Enforce Basic Authentication
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        # Reverse proxy to the Streamlit app container service name
        proxy_pass http://app:8501;
        
        # Necessary headers for Streamlit's real-time WebSockets connections
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}