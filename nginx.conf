# ==========================================
# 1. STREAMLIT APP (flights.zenzic.xyz)
# ==========================================

# HTTP to HTTPS Redirect
server {
    listen 80;
    server_name flights.zenzic.xyz;
    return 301 https://$host$request_uri;
}

# Secure HTTPS Server
server {
    listen 443 ssl;
    server_name flights.zenzic.xyz;

    ssl_certificate /etc/letsencrypt/live/flights.zenzic.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flights.zenzic.xyz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        proxy_pass http://app:8501;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ==========================================
# 2. SPLASH / MAIN PAGE (zenzic.xyz)
# ==========================================

# HTTP to HTTPS Redirect
server {
    listen 80;
    server_name zenzic.xyz www.zenzic.xyz;
    return 301 https://$host$request_uri;
}

# Secure HTTPS Server
server {
    listen 443 ssl;
    server_name zenzic.xyz www.zenzic.xyz;

    ssl_certificate /etc/letsencrypt/live/zenzic.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zenzic.xyz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /sms-webhook {
        proxy_pass http://twilio-forwarder:5001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_buffering off;
    }

    # Your existing static site configuration
    location / {
        root /var/www/zenzic-site;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }
}